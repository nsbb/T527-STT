# Experiment Config — conformer_qat_aihub100k_kd_margin0.5_ep10
# 이 파일과 동일한 설정으로 재현 가능

experiment:
  name: "conformer_qat_aihub100k_kd_margin0.5_ep10"
  date: "2026-03-31"
  type: "QAT + Knowledge Distillation + Margin Loss"
  script: "train_qat_kd.py"

model:
  base: "stt_kr_conformer_ctc_medium.1.nemo"
  architecture: "Conformer CTC Medium"
  params: "122.5M (114M trainable, 7.6M frozen)"
  vocab: 2049 (BPE, SentencePiece)
  input: "mel spectrogram (80 bins)"
  frozen_layers: "encoder.pre_encode (conv subsampling)"

data:
  source_csv: "/nas04/nlp_sk/STT/data/train/base/train_base_4356hr.csv"
  sampling:
    method: "random"
    seed: 42
    max_samples: 100000
  filter:
    cer: 0.0
    duration_min: 0.5
    duration_max: 15.0
    exclude_paths:
      - "/nas03/data_audio/005.명령어 음성"
  split:
    train: 95000
    val: 5000
  total_hours: 84.63
  manifest_train: "aihub_100k_train.json"
  manifest_val: "aihub_100k_val.json"
  text_column: "before_whisper"  # = transcript (CER=0.0이므로 동일)

hyperparameters:
  lr: 1e-5
  batch_size: 32
  epochs: 10
  optimizer: "AdamW"
  weight_decay: 0.01
  scheduler: "CosineAnnealingLR"
  scheduler_eta_min: 1e-7  # lr * 0.01
  gradient_clip: 1.0
  precision: "FP32"
  num_workers: 8

qat:
  fake_quantize_bits: 8
  fake_quantize_type: "per-tensor asymmetric uint8"
  fake_quantize_positions:
    - "encoder input (mel spectrogram)"
    - "encoder output"
    - "decoder output (logits)"

margin_loss:
  margin_target: 0.5
  margin_lambda: 0.1

knowledge_distillation:
  enabled: true
  teacher: "stt_kr_conformer_ctc_medium.1.nemo (FP32, frozen)"
  kd_lambda: 0.5
  kd_temperature: 2.0
  kd_loss_type: "KL divergence"

loss_function: "CTC + 0.1 * MarginLoss + 0.5 * KD_Loss"

environment:
  server: "gpu-114"
  gpu: "NVIDIA RTX 6000 Ada Generation x 1"
  slurm_job_id: 6639
  pytorch: "2.6.0+cu124"
  nemo: "2.7.2"
  python: "3.10"

training:
  val_check_interval: 1.0  # every epoch
  log_every_n_steps: 1
  checkpoint_save_top_k: 5
  checkpoint_monitor: "val_loss"

output:
  model_final: "conformer_qat_aihub100k_kd_margin0.5_ep10.nemo"
  output_dir: "qat_kd_100k_output/"

notes:
  - "KD는 FP32 원본 모델을 teacher로 사용 (동일 모델, frozen)"
  - "margin_target 0.3→0.5로 올림 (이전 QAT 대비)"
  - "val_loss ≠ T527 CER — 반드시 디바이스 테스트 필요"
  - "manifest는 이전 100k QAT와 동일 조건(seed=42)으로 재생성했으나 100% 동일 보장 불가"

reproduce:
  command: |
    python3 train_qat_kd.py \
      --nemo-path stt_kr_conformer_ctc_medium.1.nemo \
      --train-manifest aihub_100k_train.json \
      --val-manifest aihub_100k_val.json \
      --output-dir qat_kd_100k_output \
      --epochs 10 \
      --lr 1e-5 \
      --batch-size 32 \
      --num-workers 8 \
      --margin-target 0.5 \
      --margin-lambda 0.1 \
      --kd-lambda 0.5 \
      --kd-temperature 2.0
