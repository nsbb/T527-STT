# Experiment Config — conformer_qat_aihubfull_margin0.3_ep10
# 이 파일과 동일한 설정으로 재현 가능

experiment:
  name: "conformer_qat_aihubfull_margin0.3_ep10"
  date: "2026-03-27 to 2026-03-29"
  type: "QAT + Margin Loss (no KD)"
  script: "train_qat.py"

model:
  base: "stt_kr_conformer_ctc_medium.1.nemo"
  architecture: "Conformer CTC Medium"

data:
  source_csv: "/nas04/nlp_sk/STT/data/train/base/train_base_4356hr.csv"
  sampling:
    method: "full (no sampling)"
  filter:
    cer: 0.0
    duration_min: 0.5
    duration_max: 15.0
    exclude_paths:
      - "/nas03/data_audio/005.명령어 음성"
  total_samples: 4307477
  total_hours: 4356
  split:
    train: 4092104
    val: 215373
  manifest_train: "aihub_train_manifest.json"
  manifest_val: "aihub_val_manifest.json"

hyperparameters:
  lr: 1e-5
  batch_size: 16
  epochs: 10

qat:
  fake_quantize_bits: 8
  fake_quantize_type: "per-tensor asymmetric uint8"
  fake_quantize_positions:
    - "encoder input (mel spectrogram)"
    - "encoder output"
    - "decoder output (logits)"

margin_loss:
  margin_target: 0.3
  margin_lambda: 0.1

knowledge_distillation:
  enabled: false

loss_function: "CTC + 0.1 * MarginLoss"

environment:
  server: "gpu-112"
  gpu: "NVIDIA RTX 6000 Ada Generation x 4 (DDP)"
  slurm_job_id: 6618

training:
  training_time: "~42 hours"
  val_check_interval: 1.0  # every epoch

results:
  val_loss:
    ep00: 0.102
    ep01: 0.089
    ep02: 0.085
    ep03: 0.079
    ep04: 0.0755
    ep05: 0.0723
    ep06: 0.0709
    ep07: 0.0695
    ep08: 0.0692
    ep09: 0.0692
  val_loss_best_epoch: 8  # ep8-9 converged
  t527_cer: "not tested yet"

output:
  model_best_ep08: "conformer_qat_full_best_ep08.nemo"
  model_best_ep09: "conformer_qat_full_best_ep09.nemo"
  model_final: "conformer_qat_full_ep09_final.nemo"
  output_dir: "qat_aihub_full_output/"

notes:
  - "ep8-9에서 수렴 (val_loss 0.0692로 동일), overfitting 없음"
  - "T527 디바이스 테스트 미실시"
  - "4356시간 full 데이터 사용 — 학습 시간 ~42시간"

reproduce:
  command: |
    python3 train_qat.py \
      --nemo-path stt_kr_conformer_ctc_medium.1.nemo \
      --train-manifest aihub_train_manifest.json \
      --val-manifest aihub_val_manifest.json \
      --output-dir qat_aihub_full_output \
      --epochs 10 \
      --lr 1e-5 \
      --batch-size 16 \
      --margin-target 0.3 \
      --margin-lambda 0.1
