# Experiment Config — conformer_qat_aihub100k_margin0.3_ep10
# 이 파일과 동일한 설정으로 재현 가능

experiment:
  name: "conformer_qat_aihub100k_margin0.3_ep10"
  date: "2026-03-26"
  type: "QAT + Margin Loss (no KD)"
  script: "train_qat.py"

model:
  base: "stt_kr_conformer_ctc_medium.1.nemo"
  architecture: "Conformer CTC Medium"

data:
  source_csv: "/nas04/nlp_sk/STT/data/train/base/train_base_4356hr.csv"
  sampling:
    method: "random"
    seed: 42
    max_samples: 100000
  filter:
    cer: 0.0
    duration_min: 0.5
    duration_max: 15.0
    exclude_paths:
      - "/nas03/data_audio/005.명령어 음성"
  split:
    train: 95000
    val: 5000
  total_hours: 84.63
  manifest_train: "aihub_train_manifest.json"
  manifest_val: "aihub_val_manifest.json"
  manifest_note: "OVERWRITTEN by full data run — 더 이상 100k 데이터 아님"

hyperparameters:
  lr: 1e-5
  batch_size: 16
  epochs: 10
  optimizer: "AdamW"
  weight_decay: 0.01

qat:
  fake_quantize_bits: 8
  fake_quantize_type: "per-tensor asymmetric uint8"
  fake_quantize_positions:
    - "encoder input (mel spectrogram)"
    - "encoder output"
    - "decoder output (logits)"

margin_loss:
  margin_target: 0.3
  margin_lambda: 0.1

knowledge_distillation:
  enabled: false

loss_function: "CTC + 0.1 * MarginLoss"

environment:
  server: "gpu-108"
  gpu: "NVIDIA RTX 6000 Ada Generation x 1"
  slurm_job_id: 18337

training:
  training_time: "~2 hours"
  val_check_interval: 1.0  # every epoch

results:
  val_loss:
    ep03: 0.1446
    ep04: 0.1416  # best
    ep05: 0.1438
    ep09: 0.151   # final
  val_loss_best_epoch: 4
  t527_cer:
    ep04_best: "100% (fail)"
    ep09_final: "5.3%"

output:
  model_final: "conformer_qat_100k_84hr_final.nemo"
  model_best: "conformer_qat_100k_best_ep04.nemo"
  output_dir: "qat_aihub_output/"

notes:
  - "val_loss best(ep04) != T527 CER best — ep04는 T527에서 100% 실패"
  - "ep09 final 모델이 T527 CER 5.3%로 실제 성능 더 좋음"
  - "manifest가 full data run에 의해 덮어쓰여짐 — 원본 100k manifest 소실"

reproduce:
  command: |
    python3 train_qat.py \
      --nemo-path stt_kr_conformer_ctc_medium.1.nemo \
      --train-manifest aihub_train_manifest.json \
      --val-manifest aihub_val_manifest.json \
      --output-dir qat_aihub_output \
      --epochs 10 \
      --lr 1e-5 \
      --batch-size 16 \
      --margin-target 0.3 \
      --margin-lambda 0.1
